name: Trigger Examples

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Which environment to target'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - production

jobs:
  show-trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Show what triggered this workflow
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"

      - name: Only runs on manual trigger
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Manually triggered!"
          echo "Target environment: ${{ inputs.environment }}"

      - name: Only runs on schedule
        if: github.event_name == 'schedule'
        run: echo "This is a scheduled run"

      - name: Only runs on push
        if: github.event_name == 'push'
        run: echo "Someone pushed code to main"