name: Secrets and Env Vars

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_ENV: production
  APP_VERSION: '1.0.0'

jobs:
  show-vars:
    runs-on: ubuntu-latest

    env:
      JOB_NAME: my-deployment-job

    steps:
      - name: Show environment variables
        run: |
          echo "App env: $APP_ENV"
          echo "App version: $APP_VERSION"
          echo "Job name: $JOB_NAME"

      - name: Use a secret
        env:
          API_KEY: ${{ secrets.MY_API_KEY }}
        run: |
          echo "API key is set: ${{ secrets.MY_API_KEY != '' }}"
          echo "First char test: ${API_KEY:0:3}..."

      - name: Prove secrets are masked
        run: echo "Trying to print secret: ${{ secrets.MY_API_KEY }}"