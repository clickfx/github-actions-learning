name: Secrets and Env Vars

on:
  push:
    branches:
      - main

jobs:
  show-vars:
    runs-on: ubuntu-latest
    env:
      APP_ENV: production
      JOB_NAME: my-deployment-job
    steps:
      - name: Show env vars
        run: |
          echo "App env: $APP_ENV"
          echo "Job name: $JOB_NAME"
      - name: Show secret is set
        run: echo "Secret exists: ${{ secrets.MY_API_KEY != '' }}"
