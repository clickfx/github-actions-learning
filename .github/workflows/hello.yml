name: Secrets and Env Vars

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_ENV: production
  APP_VERSION: '1.0.0'

jobs:
  show-vars:
    runs-on: ubuntu-latest
    env:
      JOB_NAME: my-deployment-job

    steps:
      - name: Show environment variables
        run: |
          echo "App env: ${{ env.APP_ENV }}"
          echo "App version: ${{ env.APP_VERSION }}"
          echo "Job name: ${{ env.JOB_NAME }}"

      - name: Use a secret
        env:
          API_KEY: ${{ secrets.MY_API_KEY }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "ERROR: MY_API_KEY is not set in GitHub Secrets!"
            exit 1
          fi
          echo "API key is recognized by the runner."
          # Note: GitHub will still mask this output as ***
          echo "Masked secret length test: ${#API_KEY} characters"